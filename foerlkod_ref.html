<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Tutor</title>
  <!-- BEGIN:base --><base href="../"><!-- END:base -->

  <!-- CodeMirror: the code editor with syntax highlighting -->
  <link rel="stylesheet" href="codemirror_files/codemirror.min.css">
  <link rel="stylesheet" href="codemirror_files/theme/monokai.min.css">
  <script src="codemirror_files/codemirror.min.js"></script>
  <script src="codemirror_files/mode/python/python.min.js"></script>

  <!-- Skulpt: Python interpreter running in the browser -->
  <script src="skulpt_files/skulpt.min.js"></script>
  <script src="skulpt_files/skulpt-stdlib.js"></script>

  <style>
    body {
      background: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1rem;
      color: #212529;
      margin: 0;
      padding: 0;
    }
    #page {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h2 { margin: 0 0 0.5rem; }
    h5 { margin: 0 0 0.25rem; }
    hr { border: none; border-top: 1px solid #dee2e6; margin: 1rem 0; }
    .muted { color: #6c757d; }
    .small { font-size: 0.875rem; }

    /* File panes: columns side by side, stacked on narrow screens */
    .file-panes {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .file-pane { flex: 1; }
    @media (max-width: 600px) {
      .file-panes { flex-direction: column; }
    }
    .file-pane label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.25rem;
    }
    .file-pane textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 0.9rem;
      padding: 0.375rem 0.75rem;
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
      background: #fff;
      resize: vertical;
    }

    /* CodeMirror editor */
    .CodeMirror {
      height: auto;
      min-height: 180px;
      font-size: 0.95rem;
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
    }
    #code-pane { margin-bottom: 1rem; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.375rem 0.75rem;
      font-size: 1rem;
      font-weight: 400;
      border-radius: 0.375rem;
      border: 1px solid transparent;
      cursor: pointer;
      margin-right: 0.5rem;
      margin-bottom: 1rem;
      transition: background-color 0.15s, border-color 0.15s, box-shadow 0.1s, transform 0.1s;
    }
    .btn:active {
      transform: scale(0.93);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.35);
    }
    .btn-run {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    .btn-run:hover { background-color: #073a9a; border-color: #073a9a; }
    .btn-step {
      background-color: #fff;
      border-color: #198754;
      color: #198754;
    }
    .btn-step:hover { background-color: #198754; color: #fff; }
    .btn-clear {
      background-color: #fff;
      border-color: #6c757d;
      color: #6c757d;
    }
    .btn-clear:hover { background-color: #6c757d; color: #fff; }
    .btn-reset {
      background-color: #fff;
      border-color: #dc3545;
      color: #dc3545;
    }
    .btn-reset:hover { background-color: #dc3545; color: #fff; }

    /* Output pane */
    #output-wrap {
      font-family: monospace;
      font-size: 0.9rem;
      background: #212529;
      color: #f8f9fa;
      min-height: 80px;
      padding: 0.75rem;
      border-radius: 0.375rem;
    }
    #output { white-space: pre-wrap; }
    #output.error { color: #ff6b6b; }
    #output input[type="text"] {
      background: transparent;
      border: none;
      outline: none;
      color: #f8f9fa;
      font-family: inherit;
      font-size: inherit;
      caret-color: #f8f9fa;
    }

    /* Program-done flash and line */
    @keyframes done-flash {
      0%   { box-shadow: 0 0 0 3px #198754; }
      70%  { box-shadow: 0 0 0 3px #198754; }
      100% { box-shadow: none; }
    }
    #output-wrap.done-flash { animation: done-flash 0.7s ease-out forwards; }
    .done-line { color: #495057; }

    /* Step debugger highlight */
    .debug-line { background: #ffe066 !important; }
    .debug-line .CodeMirror-line,
    .debug-line .CodeMirror-line span { color: #333 !important; }

  </style>
</head>
<body>
<div id="page">

  <!-- BEGIN:title --><h2 id="exercise-title">Exercise Title</h2><!-- END:title -->
  <!-- BEGIN:description --><p class="muted" id="exercise-description">
    Exercise description.
  </p><!-- END:description -->
  <hr>

  <!-- BEGIN:file-rows -->
  <h5>Files</h5>
  <p class="muted small">You can edit these files. Your Python code can open() or import them by name.</p>

  <div class="file-panes">

    <div class="file-pane">
      <label><code>example.txt</code></label>
      <textarea rows="8" id="example.txt" data-filename="example.txt">example content
</textarea>
    </div>

  </div>
  <!-- END:file-rows -->

  <h5>Python Code</h5>
  <p class="muted small">Edit and run the code.</p>

  <div id="code-pane">
    <!-- BEGIN:code --><textarea id="code">print("hello")
</textarea><!-- END:code -->
  </div>

  <button class="btn btn-run" onclick="runCode()">&#9654; Run</button>
  <button class="btn btn-step" id="btn-step" onclick="stepCode()">Step</button>
  <button class="btn btn-clear" onclick="clearOutput()">Clear output</button>
  <button class="btn btn-reset" onclick="resetAll()">Reset</button>

  <h5>Output</h5>
  <div id="output-wrap">
    <div id="output">(output will appear here)</div>
  </div>

</div>

<script>
  // ================================================================
  // Save original content for Reset
  // ================================================================
  const originalCode = document.getElementById("code").value;
  const originalFiles = {};
  document.querySelectorAll('.file-pane textarea').forEach(function(ta) {
    originalFiles[ta.id] = ta.value;
  });

  // ================================================================
  // Apply CodeMirror to any .py file panes
  // ================================================================
  const filePaneEditors = {}; // data-filename -> CodeMirror instance

  document.querySelectorAll('.file-pane textarea').forEach(function(ta) {
    const filename = ta.getAttribute('data-filename');
    if (filename && filename.endsWith('.py')) {
      const cm = CodeMirror.fromTextArea(ta, {
        mode: 'python',
        theme: 'monokai',
        lineNumbers: true,
        indentUnit: 4,
        indentWithTabs: false,
        extraKeys: { "Tab": function(cm) { cm.replaceSelection("    "); } }
      });
      // Keep textarea value current so Skulpt's getElementById still works
      cm.on('change', function() { cm.save(); });
      filePaneEditors[filename] = cm;
    }
  });

  // ================================================================
  // stdin — inline input inside the output pane
  // ================================================================
  let stdinResolve = null;

  // Append text to output using text nodes so inline <input> elements
  // can coexist (textContent= would remove them).
  function signalDone() {
    const wrap = document.getElementById('output-wrap');
    wrap.classList.remove('done-flash');
    void wrap.offsetWidth; // reflow to restart animation
    wrap.classList.add('done-flash');
    wrap.addEventListener('animationend', () => wrap.classList.remove('done-flash'), {once: true});
    const sep = document.createElement('span');
    sep.className = 'done-line';
    sep.textContent = '\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500';
    document.getElementById('output').appendChild(sep);
  }

  function appendOutput(text) {
    const output = document.getElementById('output');
    const last = output.lastChild;
    if (last && last.nodeType === Node.TEXT_NODE) {
      last.nodeValue += text;
    } else {
      output.appendChild(document.createTextNode(text));
    }
  }

  // ================================================================
  // Set up CodeMirror on the main code textarea
  // ================================================================
  const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
    mode: "python",
    theme: "monokai",
    lineNumbers: true,
    indentUnit: 4,
    indentWithTabs: false,
    extraKeys: {
      "Tab": function(cm) { cm.replaceSelection("    "); }
    }
  });

  // ================================================================
  // Patch Skulpt's open() to support write ('w') and append ('a') mode.
  // Writes go back to the textarea with id matching the filename,
  // so students see the output file fill in as the program runs.
  // ================================================================
  (function() {
    const _origOpen = Sk.builtins.open;

    const WritableFile = Sk.misceval.buildClass(Sk.builtins, function($gbl, $loc) {
      $loc.__init__ = new Sk.builtin.func(function(self, pyFilename, pyMode) {
        const fn = Sk.ffi.remapToJs(pyFilename);
        const mode = Sk.ffi.remapToJs(pyMode);
        self._fn = fn;
        const el = document.getElementById(fn);
        if (!el) throw new Sk.builtin.IOError("No file pane for '" + fn + "' — add a file pane with that name.");
        self._el = el;
        if (mode === 'a') {
          self._buf = filePaneEditors[fn] ? filePaneEditors[fn].getValue() : el.value;
        } else {
          self._buf = '';
          if (filePaneEditors[fn]) filePaneEditors[fn].setValue('');
          else el.value = '';
        }
      });

      $loc.write = new Sk.builtin.func(function(self, pyS) {
        self._buf += Sk.ffi.remapToJs(pyS);
        if (filePaneEditors[self._fn]) filePaneEditors[self._fn].setValue(self._buf);
        else self._el.value = self._buf;
        return Sk.builtin.none.none$;
      });

      $loc.writelines = new Sk.builtin.func(function(self, pyLines) {
        Sk.misceval.iterFor(Sk.abstr.iter(pyLines), function(line) {
          self._buf += Sk.ffi.remapToJs(line);
        });
        if (filePaneEditors[self._fn]) filePaneEditors[self._fn].setValue(self._buf);
        else self._el.value = self._buf;
        return Sk.builtin.none.none$;
      });

      $loc.close = new Sk.builtin.func(function(self) {
        return Sk.builtin.none.none$;
      });

      $loc.__enter__ = new Sk.builtin.func(function(self) { return self; });
      $loc.__exit__ = new Sk.builtin.func(function(self, tp, val, tb) {
        return Sk.builtin.bool.false$;
      });
    }, 'file', [], {});

    Sk.builtins.open = new Sk.builtin.func(function(pyFilename, pyMode) {
      const mode = pyMode !== undefined ? Sk.ffi.remapToJs(pyMode) : 'r';
      if (mode === 'w' || mode === 'a') {
        return Sk.misceval.callsimArray(WritableFile, [
          pyFilename,
          pyMode !== undefined ? pyMode : new Sk.builtin.str(mode)
        ]);
      }
      return Sk.misceval.callsimArray(_origOpen,
        pyMode !== undefined ? [pyFilename, pyMode] : [pyFilename]);
    });
  })();

  // ================================================================
  // Step debugger state
  // ================================================================
  let stepResolve = null;       // resolve fn of the pending step Promise
  let debugHighlightedLine = null;
  let debugHighlightedEditor = null;

  function editorForFile(filename) {
    if (!filename) return editor;
    const key = filename.startsWith('./') ? filename.slice(2) : filename;
    return filePaneEditors[key] || editor;
  }

  function highlightDebugLine(filename, lineno) {
    if (debugHighlightedEditor !== null && debugHighlightedLine !== null) {
      try { debugHighlightedEditor.removeLineClass(debugHighlightedLine, 'wrap', 'debug-line'); } catch(e) {}
    }
    const ed = editorForFile(filename);
    if (lineno !== null && lineno !== undefined && !isNaN(lineno)) {
      debugHighlightedLine = lineno - 1;
      debugHighlightedEditor = ed;
      ed.addLineClass(debugHighlightedLine, 'wrap', 'debug-line');
      ed.scrollIntoView({line: debugHighlightedLine, ch: 0});
    } else {
      debugHighlightedLine = null;
      debugHighlightedEditor = null;
    }
  }

  function getSuspInfo(susp) {
    // Traverse the entire chain — the INNERMOST $lineno is the current execution point.
    // The outer layers stay suspended (e.g. the import statement in main while helpers.py runs).
    let result = {lineno: null, filename: null};
    while (susp && susp.$isSuspension) {
      if (susp.$lineno !== undefined) {
        result = {lineno: susp.$lineno, filename: susp.$filename};
      }
      susp = susp.child;
    }
    return result;
  }

  // Called by asyncToPromise when a debug suspension is hit.
  // Returns a Promise that resolves (with the resumed value) when the user clicks Step.
  function debugHandler(susp) {
    const {lineno, filename} = getSuspInfo(susp);
    highlightDebugLine(filename, lineno);
    return new Promise(function(resolve, reject) {
      stepResolve = function() {
        try { resolve(susp.resume()); }
        catch(e) { reject(e); }
      };
    });
  }

  function collectFiles() {
    const files = {};
    document.querySelectorAll('.file-pane textarea').forEach(function(ta) {
      const filename = ta.getAttribute('data-filename');
      if (!filename) return;
      const content = filePaneEditors[filename]
        ? filePaneEditors[filename].getValue()
        : ta.value;
      files[filename] = content.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    });
    return files;
  }

  // ================================================================
  // makeInputFun() — injects an inline <input> after the prompt text.
  // Execution pauses until the user presses Enter.
  // ================================================================
  function makeInputFun() {
    return function(prompt) {
      const output = document.getElementById('output');
      if (prompt) appendOutput(prompt);
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.size = 1;
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      inp.addEventListener('input', function() {
        this.size = Math.max(1, this.value.length + 1);
      });
      inp.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter' || stdinResolve === null) return;
        e.preventDefault();
        const line = this.value;
        const resolve = stdinResolve;
        stdinResolve = null;
        output.replaceChild(document.createTextNode(line + '\n'), inp);
        resolve(line);
      });
      output.appendChild(inp);
      inp.focus();
      return new Promise(function(resolve) {
        stdinResolve = resolve;
      });
    };
  }

  function makeReader(files) {
    return function(filename) {
      // Skulpt prefixes module imports with "./" — strip it for lookup
      const key = filename.startsWith('./') ? filename.slice(2) : filename;
      if (files.hasOwnProperty(key)) return files[key];
      if (Sk.builtinFiles === undefined || Sk.builtinFiles['files'][filename] === undefined)
        throw "File not found: '" + filename + "'";
      return Sk.builtinFiles['files'][filename];
    };
  }

  function stepCode() {
    const output = document.getElementById('output');

    if (stepResolve) {
      // Already stepping — advance one step
      const resume = stepResolve;
      stepResolve = null;
      resume();
      return;
    }

    // Start fresh debug session
    output.textContent = '';
    output.classList.remove('error');
    highlightDebugLine(null, null);
    stdinResolve = null;

    const files = collectFiles();
    Sk.configure({
      output: function(text) { appendOutput(text); },
      read: makeReader(files),
      inputfun: makeInputFun(),
      debugging: true,
      breakpoints: function() { return true; },
      execLimit: 30000
    });

    Sk.misceval.asyncToPromise(
      function() { return Sk.importMainWithBody('<stdin>', false, editor.getValue(), true); },
      {'Sk.debug': debugHandler}
    ).then(function() {
      stepResolve = null;
      highlightDebugLine(null, null);
      signalDone();
    }).catch(function(err) {
      stepResolve = null;
      highlightDebugLine(null, null);
      output.classList.add('error');
      output.textContent = err.toString();
    });
  }

  // ================================================================
  // runCode() — runs the full program without stepping
  // ================================================================
  function runCode() {
    stepResolve = null;
    highlightDebugLine(null, null);

    const output = document.getElementById("output");
    output.textContent = "";
    output.classList.remove("error");
    stdinResolve = null;

    const files = collectFiles();
    Sk.configure({
      output: function(text) { appendOutput(text); },
      read: makeReader(files),
      inputfun: makeInputFun(),
      execLimit: 10000
    });

    Sk.misceval.asyncToPromise(function() {
      return Sk.importMainWithBody("<stdin>", false, editor.getValue(), true);
    }).then(function() {
      signalDone();
    }).catch(function(err) {
      output.classList.add("error");
      output.textContent = err.toString();
    });
  }

  function clearOutput() {
    const output = document.getElementById("output");
    output.textContent = "(output will appear here)";
    output.classList.remove("error");
  }

  function resetAll() {
    editor.setValue(originalCode);
    document.querySelectorAll('.file-pane textarea').forEach(function(ta) {
      const filename = ta.getAttribute('data-filename');
      if (originalFiles[ta.id] !== undefined) {
        if (filePaneEditors[filename]) {
          filePaneEditors[filename].setValue(originalFiles[ta.id]);
        } else {
          ta.value = originalFiles[ta.id];
        }
      }
    });
    clearOutput();
    stepResolve = null;
    highlightDebugLine(null, null);
    stdinResolve = null;
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alba-trinket</title>
  <!-- BEGIN:base --><base href="../"><!-- END:base -->

  <!-- CodeMirror: the code editor with syntax highlighting -->
  <link rel="stylesheet" href="codemirror_files/codemirror.min.css">
  <link rel="stylesheet" href="codemirror_files/theme/monokai.min.css">
  <script src="codemirror_files/codemirror.min.js"></script>
  <script src="codemirror_files/mode/python/python.min.js"></script>

  <!-- Skulpt: Python interpreter running in the browser -->
  <script src="skulpt_files/skulpt.min.js"></script>
  <script src="skulpt_files/skulpt-stdlib.js"></script>

  <style>
    body {
      background: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1rem;
      color: #212529;
      margin: 0;
      padding: 0;
    }
    #page {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h2 { margin: 0 0 0.5rem; }
    h5 { margin: 0 0 0.25rem; }
    hr { border: none; border-top: 1px solid #dee2e6; margin: 1rem 0; }
    .muted { color: #6c757d; }
    .small { font-size: 0.875rem; }

    /* File panes: columns side by side, stacked on narrow screens */
    .file-panes {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .file-pane { flex: 1; }
    @media (max-width: 600px) {
      .file-panes { flex-direction: column; }
    }
    .file-pane label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.25rem;
    }
    .file-pane textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 0.9rem;
      padding: 0.375rem 0.75rem;
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
      background: #fff;
      resize: vertical;
    }

    /* CodeMirror editor */
    .CodeMirror {
      height: auto;
      min-height: 180px;
      font-size: 0.95rem;
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
    }
    #code-pane { margin-bottom: 1rem; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.375rem 0.75rem;
      font-size: 1rem;
      font-weight: 400;
      border-radius: 0.375rem;
      border: 1px solid transparent;
      cursor: pointer;
      margin-right: 0.5rem;
      margin-bottom: 1rem;
      transition: background-color 0.15s, border-color 0.15s, box-shadow 0.1s, transform 0.1s;
    }
    .btn:active {
      transform: scale(0.93);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.35);
    }
    .btn-run {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    .btn-run:hover { background-color: #073a9a; border-color: #073a9a; }
    .btn-step {
      background-color: #fff;
      border-color: #198754;
      color: #198754;
    }
    .btn-step:hover { background-color: #198754; color: #fff; }
    .btn-clear {
      background-color: #fff;
      border-color: #6c757d;
      color: #6c757d;
    }
    .btn-clear:hover { background-color: #6c757d; color: #fff; }
    .btn-reset {
      background-color: #fff;
      border-color: #dc3545;
      color: #dc3545;
    }
    .btn-reset:hover { background-color: #dc3545; color: #fff; }

    /* Output pane */
    #output-wrap {
      font-family: monospace;
      font-size: 0.9rem;
      background: #212529;
      color: #f8f9fa;
      min-height: 80px;
      padding: 0.75rem;
      border-radius: 0.375rem;
    }
    #output { white-space: pre-wrap; }
    #output.error { color: #ff6b6b; }
    #output input[type="text"] {
      background: transparent;
      border: none;
      outline: none;
      color: #f8f9fa;
      font-family: inherit;
      font-size: inherit;
      caret-color: #f8f9fa;
    }
    @keyframes input-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.3); }
      50%       { box-shadow: 0 0 0 5px rgba(13, 110, 253, 0.6); }
    }
    #output-wrap.waiting-input { animation: input-pulse 1.2s ease-in-out infinite; }
    .input-arrow {
      color: #0d6efd;
      font-style: normal;
      animation: input-arrow-bounce 0.8s ease-in-out infinite alternate;
    }
    @keyframes input-arrow-bounce {
      from { transform: translateX(0); }
      to   { transform: translateX(4px); }
    }

    /* Teacher toolbar */
    #teacher-bar {
      display: none;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
    }
    #teacher-bar.visible { display: inline-block; }
    #teacher-bar .teacher-heading {
      font-size: 0.8rem;
      font-weight: 600;
      color: #e65100;
      margin-bottom: 0.5rem;
    }
    #teacher-bar .teacher-row {
      display: flex;
      align-items: flex-end;
      gap: 0.75rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }
    #teacher-bar .teacher-field {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    #teacher-bar label { font-size: 0.85rem; color: #6c757d; }
    #teacher-bar .teacher-row .btn { margin-bottom: 0; }
    #teacher-bar input[type="text"],
    #teacher-bar select {
      font-size: 0.875rem;
      padding: 0.25rem 0.5rem;
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
      background: #fff;
    }
    #teacher-bar input[type="text"]::placeholder { color: #adb5bd; }
    #teacher-bar select:disabled,
    #teacher-bar button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-teacher-save {
      background-color: #fff;
      border-color: #fd7e14;
      color: #fd7e14;
    }
    .btn-teacher-save:hover { background-color: #fd7e14; color: #fff; }
    .btn-teacher-iframe {
      background-color: #fff;
      border-color: #6f42c1;
      color: #6f42c1;
    }
    .btn-teacher-iframe:hover { background-color: #6f42c1; color: #fff; }

    /* Program-done flash and line */
    @keyframes done-flash {
      0%   { box-shadow: 0 0 0 3px #198754; }
      70%  { box-shadow: 0 0 0 3px #198754; }
      100% { box-shadow: none; }
    }
    #output-wrap.done-flash { animation: done-flash 0.7s ease-out forwards; }
    .done-line { color: #495057; }

    /* Step debugger highlight */
    .debug-line { background: #ffe066 !important; }
    .debug-line .CodeMirror-line,
    .debug-line .CodeMirror-line span { color: #333 !important; }

  </style>
</head>
<body>
<div id="page">

  <div id="teacher-bar">
    <div class="teacher-heading">⚙ Teacher mode</div>
    <div class="teacher-row">
      <div class="teacher-field">
        <label>Load — Folder</label>
        <select id="teacher-folder" onchange="teacherLoadFiles(this.value); updateSaveStatus()"></select>
      </div>
      <div class="teacher-field">
        <label>Filename</label>
        <select id="teacher-filename" onchange="teacherLoad()"></select>
      </div>
      <div style="width:1px;background:#ffe082;align-self:stretch;margin:0 0.25rem;"></div>
      <div class="teacher-field">
        <label>Save as — Folder (optional)</label>
        <input type="text" id="teacher-save-folder" size="12" placeholder="(same as Load)">
      </div>
      <div class="teacher-field">
        <label>Filename</label>
        <input type="text" id="teacher-save-filename" size="14" placeholder="filename.md">
      </div>
      <button class="btn btn-teacher-save" id="teacher-save-btn" onclick="teacherSave()" disabled>&#8659; Save</button>
      <button class="btn btn-teacher-iframe" onclick="teacherGenerateIframe()">&#10697; Generate iframe</button>
    </div>
    <div id="teacher-save-status" style="display:none;font-size:0.8rem;padding:0.25rem 0.5rem;margin-top:-0.25rem;"></div>
  </div>

  <div id="teacher-iframe-panel" style="display:none;margin-bottom:1rem;">
    <label style="display:block;font-size:0.85rem;color:#6c757d;margin-bottom:0.4rem;">Embed code</label>
    <textarea id="teacher-embed-code" rows="2" readonly style="width:100%;box-sizing:border-box;font-family:monospace;font-size:0.8rem;padding:0.375rem 0.75rem;border:1px solid #ced4da;border-radius:0.375rem;background:#f8f9fa;" onclick="this.select()"></textarea>
  </div>

  <!-- BEGIN:title --><h2 id="exercise-title">Exercise Title</h2><!-- END:title -->
  <!-- BEGIN:description --><p class="muted" id="exercise-description">
    Exercise description.
  </p><!-- END:description -->

  <hr>

  <!-- BEGIN:file-rows -->
  <h5>Files</h5>
  <p class="muted small">You can edit these files. Your Python code can open() or import them by name.</p>

  <div class="file-panes">

    <div class="file-pane">
      <label><code>example.txt</code></label>
      <textarea rows="8" id="example.txt" data-filename="example.txt">example content
</textarea>
    </div>

  </div>
  <!-- END:file-rows -->

  <h5>Python Code</h5>
  <p class="muted small">Edit and run the code.</p>

  <div id="code-pane">
    <!-- BEGIN:code --><textarea id="code">print("hello")
</textarea><!-- END:code -->
  </div>

  <button class="btn btn-run" onclick="runCode()">&#9654; Run</button>
  <button class="btn btn-step" id="btn-step" onclick="stepCode()">Step</button>
  <button class="btn btn-clear" onclick="clearOutput()">Clear output</button>
  <button class="btn btn-reset" onclick="resetAll()">Reset</button>

  <h5>Output</h5>
  <div id="output-wrap">
    <div id="output">(output will appear here)</div>
  </div>

</div>

<script>
  // ================================================================
  // Save original content for Reset
  // ================================================================
  const originalCode = document.getElementById("code").value;
  const originalFiles = {};
  document.querySelectorAll('.file-pane textarea').forEach(function(ta) {
    originalFiles[ta.id] = ta.value;
  });

  // ================================================================
  // Apply CodeMirror to any .py file panes
  // ================================================================
  const filePaneEditors = {}; // data-filename -> CodeMirror instance

  document.querySelectorAll('.file-pane textarea').forEach(function(ta) {
    const filename = ta.getAttribute('data-filename');
    if (filename && filename.endsWith('.py')) {
      const cm = CodeMirror.fromTextArea(ta, {
        mode: 'python',
        theme: 'monokai',
        lineNumbers: true,
        indentUnit: 4,
        indentWithTabs: false,
        extraKeys: { "Tab": function(cm) { cm.replaceSelection("    "); } }
      });
      // Keep textarea value current so Skulpt's getElementById still works
      cm.on('change', function() { cm.save(); });
      filePaneEditors[filename] = cm;
    }
  });

  // ================================================================
  // stdin — inline input inside the output pane
  // ================================================================
  let stdinResolve = null;

  // Append text to output using text nodes so inline <input> elements
  // can coexist (textContent= would remove them).
  function signalDone() {
    const wrap = document.getElementById('output-wrap');
    wrap.classList.remove('done-flash');
    void wrap.offsetWidth; // reflow to restart animation
    wrap.classList.add('done-flash');
    wrap.addEventListener('animationend', () => wrap.classList.remove('done-flash'), {once: true});
    const sep = document.createElement('span');
    sep.className = 'done-line';
    sep.innerHTML = '\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 <i>finished</i> \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500';
    document.getElementById('output').appendChild(sep);
  }

  function appendOutput(text) {
    const output = document.getElementById('output');
    const last = output.lastChild;
    if (last && last.nodeType === Node.TEXT_NODE) {
      last.nodeValue += text;
    } else {
      output.appendChild(document.createTextNode(text));
    }
  }

  // ================================================================
  // Set up CodeMirror on the main code textarea
  // ================================================================
  const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
    mode: "python",
    theme: "monokai",
    lineNumbers: true,
    indentUnit: 4,
    indentWithTabs: false,
    extraKeys: {
      "Tab": function(cm) { cm.replaceSelection("    "); }
    }
  });

  // ================================================================
  // Patch Skulpt's open() to support write ('w') and append ('a') mode.
  // Writes go back to the textarea with id matching the filename,
  // so students see the output file fill in as the program runs.
  // ================================================================
  (function() {
    const _origOpen = Sk.builtins.open;

    const WritableFile = Sk.misceval.buildClass(Sk.builtins, function($gbl, $loc) {
      $loc.__init__ = new Sk.builtin.func(function(self, pyFilename, pyMode) {
        const fn = Sk.ffi.remapToJs(pyFilename);
        const mode = Sk.ffi.remapToJs(pyMode);
        self._fn = fn;
        const el = document.getElementById(fn);
        if (!el) throw new Sk.builtin.IOError("No file pane for '" + fn + "' — add a file pane with that name.");
        self._el = el;
        if (mode === 'a') {
          self._buf = filePaneEditors[fn] ? filePaneEditors[fn].getValue() : el.value;
        } else {
          self._buf = '';
          if (filePaneEditors[fn]) filePaneEditors[fn].setValue('');
          else el.value = '';
        }
      });

      $loc.write = new Sk.builtin.func(function(self, pyS) {
        self._buf += Sk.ffi.remapToJs(pyS);
        if (filePaneEditors[self._fn]) filePaneEditors[self._fn].setValue(self._buf);
        else self._el.value = self._buf;
        return Sk.builtin.none.none$;
      });

      $loc.writelines = new Sk.builtin.func(function(self, pyLines) {
        Sk.misceval.iterFor(Sk.abstr.iter(pyLines), function(line) {
          self._buf += Sk.ffi.remapToJs(line);
        });
        if (filePaneEditors[self._fn]) filePaneEditors[self._fn].setValue(self._buf);
        else self._el.value = self._buf;
        return Sk.builtin.none.none$;
      });

      $loc.close = new Sk.builtin.func(function(self) {
        return Sk.builtin.none.none$;
      });

      $loc.__enter__ = new Sk.builtin.func(function(self) { return self; });
      $loc.__exit__ = new Sk.builtin.func(function(self, tp, val, tb) {
        return Sk.builtin.bool.false$;
      });
    }, 'file', [], {});

    Sk.builtins.open = new Sk.builtin.func(function(pyFilename, pyMode) {
      const mode = pyMode !== undefined ? Sk.ffi.remapToJs(pyMode) : 'r';
      if (mode === 'w' || mode === 'a') {
        return Sk.misceval.callsimArray(WritableFile, [
          pyFilename,
          pyMode !== undefined ? pyMode : new Sk.builtin.str(mode)
        ]);
      }
      return Sk.misceval.callsimArray(_origOpen,
        pyMode !== undefined ? [pyFilename, pyMode] : [pyFilename]);
    });
  })();

  // ================================================================
  // Step debugger state
  // ================================================================
  let stepResolve = null;       // resolve fn of the pending step Promise
  let debugHighlightedLine = null;
  let debugHighlightedEditor = null;

  function editorForFile(filename) {
    if (!filename) return editor;
    const key = filename.startsWith('./') ? filename.slice(2) : filename;
    return filePaneEditors[key] || editor;
  }

  function highlightDebugLine(filename, lineno) {
    if (debugHighlightedEditor !== null && debugHighlightedLine !== null) {
      try { debugHighlightedEditor.removeLineClass(debugHighlightedLine, 'wrap', 'debug-line'); } catch(e) {}
    }
    const ed = editorForFile(filename);
    if (lineno !== null && lineno !== undefined && !isNaN(lineno)) {
      debugHighlightedLine = lineno - 1;
      debugHighlightedEditor = ed;
      ed.addLineClass(debugHighlightedLine, 'wrap', 'debug-line');
      ed.scrollIntoView({line: debugHighlightedLine, ch: 0});
    } else {
      debugHighlightedLine = null;
      debugHighlightedEditor = null;
    }
  }

  function getSuspInfo(susp) {
    // Traverse the entire chain — the INNERMOST $lineno is the current execution point.
    // The outer layers stay suspended (e.g. the import statement in main while helpers.py runs).
    let result = {lineno: null, filename: null};
    while (susp && susp.$isSuspension) {
      if (susp.$lineno !== undefined) {
        result = {lineno: susp.$lineno, filename: susp.$filename};
      }
      susp = susp.child;
    }
    return result;
  }

  // Called by asyncToPromise when a debug suspension is hit.
  // Returns a Promise that resolves (with the resumed value) when the user clicks Step.
  function debugHandler(susp) {
    const {lineno, filename} = getSuspInfo(susp);
    highlightDebugLine(filename, lineno);
    return new Promise(function(resolve, reject) {
      stepResolve = function() {
        try { resolve(susp.resume()); }
        catch(e) { reject(e); }
      };
    });
  }

  function collectFiles() {
    const files = {};
    document.querySelectorAll('.file-pane textarea').forEach(function(ta) {
      const filename = ta.getAttribute('data-filename');
      if (!filename) return;
      const content = filePaneEditors[filename]
        ? filePaneEditors[filename].getValue()
        : ta.value;
      files[filename] = content.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    });
    return files;
  }

  // ================================================================
  // makeInputFun() — injects an inline <input> after the prompt text.
  // Execution pauses until the user presses Enter.
  // ================================================================
  function makeInputFun() {
    return function(prompt) {
      const output = document.getElementById('output');
      const wrap = document.getElementById('output-wrap');
      if (prompt) appendOutput(prompt);
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.size = 1;
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      wrap.classList.add('waiting-input');
      inp.addEventListener('input', function() {
        this.size = Math.max(1, this.value.length + 1);
      });
      inp.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter' || stdinResolve === null) return;
        e.preventDefault();
        const line = this.value;
        const resolve = stdinResolve;
        stdinResolve = null;
        wrap.classList.remove('waiting-input');
        output.replaceChild(document.createTextNode(line + '\n'), inp);
        resolve(line);
      });
      output.appendChild(inp);
      inp.focus();
      return new Promise(function(resolve) {
        stdinResolve = resolve;
      });
    };
  }

  function makeReader(files) {
    return function(filename) {
      // Skulpt prefixes module imports with "./" — strip it for lookup
      const key = filename.startsWith('./') ? filename.slice(2) : filename;
      if (files.hasOwnProperty(key)) return files[key];
      if (Sk.builtinFiles === undefined || Sk.builtinFiles['files'][filename] === undefined)
        throw "File not found: '" + filename + "'";
      return Sk.builtinFiles['files'][filename];
    };
  }

  function stepCode() {
    const output = document.getElementById('output');

    if (stepResolve) {
      // Already stepping — advance one step
      const resume = stepResolve;
      stepResolve = null;
      resume();
      return;
    }

    // Start fresh debug session
    output.textContent = '';
    output.classList.remove('error');
    document.getElementById('output-wrap').classList.remove('waiting-input');
    highlightDebugLine(null, null);
    stdinResolve = null;

    const files = collectFiles();
    Sk.configure({
      output: function(text) { appendOutput(text); },
      read: makeReader(files),
      inputfun: makeInputFun(),
      debugging: true,
      breakpoints: function() { return true; },
      execLimit: 30000
    });

    Sk.misceval.asyncToPromise(
      function() { return Sk.importMainWithBody('<stdin>', false, editor.getValue(), true); },
      {'Sk.debug': debugHandler}
    ).then(function() {
      stepResolve = null;
      highlightDebugLine(null, null);
      signalDone();
    }).catch(function(err) {
      stepResolve = null;
      highlightDebugLine(null, null);
      output.classList.add('error');
      output.textContent = err.toString();
    });
  }

  // ================================================================
  // runCode() — runs the full program without stepping
  // ================================================================
  function runCode() {
    stepResolve = null;
    highlightDebugLine(null, null);

    const output = document.getElementById("output");
    output.textContent = "";
    output.classList.remove("error");
    document.getElementById('output-wrap').classList.remove('waiting-input');
    stdinResolve = null;

    const files = collectFiles();
    Sk.configure({
      output: function(text) { appendOutput(text); },
      read: makeReader(files),
      inputfun: makeInputFun(),
      execLimit: 10000
    });

    Sk.misceval.asyncToPromise(function() {
      return Sk.importMainWithBody("<stdin>", false, editor.getValue(), true);
    }).then(function() {
      signalDone();
    }).catch(function(err) {
      output.classList.add("error");
      output.textContent = err.toString();
    });
  }

  function clearOutput() {
    const output = document.getElementById("output");
    output.textContent = "(output will appear here)";
    output.classList.remove("error");
  }

  function resetAll() {
    editor.setValue(originalCode);
    document.querySelectorAll('.file-pane textarea').forEach(function(ta) {
      const filename = ta.getAttribute('data-filename');
      if (originalFiles[ta.id] !== undefined) {
        if (filePaneEditors[filename]) {
          filePaneEditors[filename].setValue(originalFiles[ta.id]);
        } else {
          ta.value = originalFiles[ta.id];
        }
      }
    });
    clearOutput();
    stepResolve = null;
    highlightDebugLine(null, null);
    stdinResolve = null;
  }

  // ================================================================
  // Teacher mode — activate with ?mode=teacher
  // ================================================================
  const SAVE_TOKEN = 'gnK2Qoxyc47xqYr1';
  // Track known folders and their files for save status feedback
  const teacherKnown = { folders: {}, currentFolder: '', currentFile: '' };

  function updateSaveStatus() {
    var statusEl = document.getElementById('teacher-save-status');
    if (!statusEl) return;
    var folder = (document.getElementById('teacher-save-folder').value || '').trim()
                 || (document.getElementById('teacher-folder').value || '');
    var filename = (document.getElementById('teacher-save-filename').value || '').trim();
    var btn = document.getElementById('teacher-save-btn');

    // Auto-append .md if missing
    if (filename && !filename.endsWith('.md')) filename += '.md';

    if (!filename) {
      statusEl.style.display = 'none';
      btn.textContent = '\u21D9 Save';
      btn.style.backgroundColor = '';
      btn.style.color = '';
      btn.disabled = true;
      return;
    }

    btn.disabled = false;
    statusEl.style.display = 'block';
    var folderExists = folder in teacherKnown.folders;
    var fileExists = folderExists && teacherKnown.folders[folder].includes(filename);
    var path = folder + '/' + filename;

    if (fileExists) {
      statusEl.textContent = 'Will overwrite ' + path;
      statusEl.style.color = '#e67700';
      btn.textContent = '\u21D9 Overwrite';
      btn.style.backgroundColor = '#e67700';
      btn.style.color = '#fff';
    } else if (folderExists) {
      statusEl.textContent = 'Will create new file ' + path;
      statusEl.style.color = '#2b8a3e';
      btn.textContent = '\u271A Create new';
      btn.style.backgroundColor = '#2b8a3e';
      btn.style.color = '#fff';
    } else {
      statusEl.textContent = 'Will create new folder ' + folder + '/ and file ' + filename;
      statusEl.style.color = '#2b8a3e';
      btn.textContent = '\u271A Create new';
      btn.style.backgroundColor = '#2b8a3e';
      btn.style.color = '#fff';
    }
  }

  function teacherDisableLoad(reason) {
    ['teacher-folder', 'teacher-filename', 'teacher-save-folder', 'teacher-save-filename', 'teacher-save-btn'].forEach(function(id) {
      const el = document.getElementById(id);
      el.disabled = true;
      el.title = reason;
    });
  }

  function teacherBuildMarkdown() {
    const title = document.getElementById('exercise-title').textContent.trim();
    const desc  = document.getElementById('exercise-description').textContent.trim();
    const code  = editor.getValue();

    const fileParts = [];
    document.querySelectorAll('.file-pane').forEach(function(pane) {
      const ta = pane.querySelector('textarea');
      if (!ta) return;
      const name = ta.getAttribute('data-filename');
      const content = ta.value;
      fileParts.push('### ' + name + '\n```\n' + content + '\n```');
    });

    let md = '# ' + title + '\n\n';
    md += '## Description\n' + desc + '\n\n';
    if (fileParts.length) md += '## Files\n' + fileParts.join('\n\n') + '\n\n';
    md += '## Main Code\n```python\n' + code + '\n```\n';
    return md;
  }

  async function teacherSave() {
    const folder   = document.getElementById('teacher-save-folder').value.trim()
                     || document.getElementById('teacher-folder').value;
    let   filename = document.getElementById('teacher-save-filename').value.trim();
    if (!filename) { alert('Enter a filename before saving.'); return; }
    if (!filename.endsWith('.md')) filename += '.md';

    const content = teacherBuildMarkdown();
    const btn = document.getElementById('teacher-save-btn');
    btn.textContent = '⏳ Saving…';
    btn.disabled = true;

    try {
      const resp = await fetch('save.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: new URLSearchParams({folder, filename, content, token: SAVE_TOKEN})
      });
      const json = await resp.json();
      if (json.ok) {
        btn.textContent = '✓ Saved';
        // Update Load dropdowns to reflect the saved file
        var folderSel = document.getElementById('teacher-folder');
        if (![...folderSel.options].some(function(o) { return o.value === folder; })) {
          var o = document.createElement('option');
          o.value = folder; o.textContent = folder; folderSel.appendChild(o);
          teacherKnown.folders[folder] = [];
        }
        folderSel.value = folder;
        await teacherLoadFiles(folder);
        var fileSel = document.getElementById('teacher-filename');
        fileSel.value = filename;
        // Clear Save As fields
        document.getElementById('teacher-save-folder').value = '';
        document.getElementById('teacher-save-filename').value = '';
        updateSaveStatus();
        setTimeout(function() { btn.textContent = '\u21D9 Save'; }, 2000);
      } else {
        alert('Save failed: ' + json.error);
        btn.textContent = '↙ Save';
        btn.disabled = false;
      }
    } catch(e) {
      alert('Save error: ' + e);
      btn.textContent = '↙ Save';
      btn.disabled = false;
    }
  }

  function teacherGenerateIframe() {
    const studentUrl = window.location.origin + window.location.pathname;
    document.getElementById('teacher-embed-code').value =
      '<iframe src="' + studentUrl + '" width="900" height="600" frameborder="0" allowfullscreen></iframe>';
    document.getElementById('teacher-iframe-panel').style.display = 'block';
  }


  async function teacherLoadFolders() {
    try {
      const resp = await fetch('src/');
      if (!resp.ok) { teacherDisableLoad('(load unavailable — no src/ access)'); return; }
      const html = await resp.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const folders = [...doc.querySelectorAll('a[href]')]
        .map(a => a.getAttribute('href').replace(/\/$/, ''))
        .filter(h => h && !h.startsWith('?') && !h.startsWith('/') && h !== '..');
      if (!folders.length) { teacherDisableLoad('(load unavailable — no src/ access)'); return; }
      const sel = document.getElementById('teacher-folder');
      folders.forEach(function(f) {
        const o = document.createElement('option');
        o.value = f; o.textContent = f; sel.appendChild(o);
        teacherKnown.folders[f] = [];
      });
      await teacherLoadFiles(folders[0]);
    } catch(e) { teacherDisableLoad('(load unavailable — no src/ access)'); }
  }

  async function teacherLoadFiles(folder) {
    try {
      const resp = await fetch('src/' + folder + '/');
      const html = await resp.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const files = [...doc.querySelectorAll('a[href]')]
        .map(a => a.getAttribute('href'))
        .filter(h => h.endsWith('.md'));
      teacherKnown.folders[folder] = files;
      const sel = document.getElementById('teacher-filename');
      sel.innerHTML = '';
      files.forEach(function(f) {
        const o = document.createElement('option');
        o.value = f; o.textContent = f; sel.appendChild(o);
      });
      updateSaveStatus();
    } catch(e) { console.warn('Teacher: could not list src/' + folder, e); }
  }

  function teacherLoad() {
    const folder   = document.getElementById('teacher-folder').value;
    const filename = document.getElementById('teacher-filename').value;
    const html = filename.replace('.md', '.html');
    window.location.href = html + '?mode=teacher&folder=' + encodeURIComponent(folder) + '&file=' + encodeURIComponent(filename);
  }

  if (new URLSearchParams(window.location.search).get('mode') === 'teacher') {
    document.getElementById('teacher-bar').classList.add('visible');
    teacherLoadFolders();
    const params = new URLSearchParams(window.location.search);
    const preFolder = params.get('folder');
    const preFile   = params.get('file');
    const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    if (isLocal) {
      document.getElementById('teacher-save-folder').addEventListener('input', async function() {
        var folder = this.value.trim();
        if (folder && folder in teacherKnown.folders && teacherKnown.folders[folder].length === 0) {
          await teacherLoadFiles(folder);
        }
        updateSaveStatus();
      });
      document.getElementById('teacher-save-filename').addEventListener('input', updateSaveStatus);
      updateSaveStatus();
    } else {
      // Hide Save As on deployed server — only allow editing existing files
      ['teacher-save-folder', 'teacher-save-filename', 'teacher-save-btn'].forEach(function(id) {
        document.getElementById(id).style.display = 'none';
      });
    }
  }
</script>
